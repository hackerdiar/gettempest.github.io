<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEMPEST</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .main { width: 100%; max-width: 300px; }

        h1 {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: -1px;
            margin: 0 0 40px 0;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        a {
            color: #555;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.2s;
            padding: 10px;
            border: 1px solid #111;
        }

        a:hover {
            color: #ffffff;
            border-color: #4b0082;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.7rem;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="main">
        <h1>TEMPEST</h1>

        <div class="links">
            <a href="#">Download</a>
            <a href="#">Discord</a>
            <a href="#">Status</a>
        </div>

        <div class="footer">
            TEMPEST EXECUTION // 2026
        </div>
    </div>

</body>
</html>
