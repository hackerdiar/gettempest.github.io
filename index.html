<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempest | Elite Execution</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&family=JetBrains+Mono:wght@400&display=swap');

        :root {
            --bg: #09090b;
            --panel: #121215;
            --indigo: #4b0082;
            --text: #e4e4e7;
            --muted: #71717a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -2px;
            margin-bottom: 10px;
        }

        .logo span { color: var(--indigo); }

        .tagline {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .box {
            background: var(--panel);
            border: 1px solid #27272a;
            padding: 30px;
            border-radius: 8px;
            text-align: left;
        }

        .btn {
            display: block;
            background: var(--indigo);
            color: white;
            text-decoration: none;
            padding: 12px;
            text-align: center;
            border-radius: 4px;
            margin-top: 20px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.8; }

        .footer-links {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">TEM<span>PEST</span></div>
        <div class="tagline">Next-generation script execution.</div>

        <div class="box">
            <p style="margin: 0 0 10px 0; font-size: 0.9rem;">Status: <span style="color: #22c55e;">Operational</span></p>
            <p style="color: var(--muted); font-size: 0.9rem;">Version: 1.2.0 (Stable)</p>
            <a href="#" class="btn">Download Installer</a>
        </div>

        <div class="footer-links">
            v1.2.0 • SHA-256 Verified • Updated May 2026
        </div>
    </div>

</body>
</html>
